<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./utility.css">
</head>
<body>
    <header class="flex">
        
        <div class="global_nav flex">
            <ul class="flex">
                <li class="logo-li flex"><div class="logo"><img src="../Assets/svg/Logo.svg" alt="" width="32"></div></li>
                <li class="bg-lightgrey home flex ">
                    <div class="invert">
                        <img src="../Assets/svg/home.svg" alt="" width="24">
                    </div>
                    
                </li>
                <li class =" search circular bg-lightgrey flex"><div class="invert"><img src="../Assets/svg/search.svg" alt="" width="22"></div>
                    <input type="text" placeholder="What do you want to play?">
                </li>
            </ul>
        </div>

        <div class="nav-right flex">
            <ul class="nav-links nobullets flex">
                <li><a href="#">Premium</a></li>
                <li><a href="#">Support</a></li>
                <li><a href="#">Download</a></li>
            </ul>

            <div class="divider"></div>
            
            <div class="install-app flex">
                <img class="invert" src="../Assets/svg/install.svg" width="16">
                <span>Install App</span>
             </div>
                <div class="login-signup flex">
                <a href="#" class="signup">Sign up</a>

                <button class="login-btn rad-button flat circular">Log in</button>
            </div>

        </div>
        
    </header>
    
    <main class=" flex " >
        <section class="left bg-grey rounded vflex">
        
            <div class="library-header flex ">
                
                <div class="library flex bold">Your Library</div>
                
                    
                <button class=" addPlaylist-btn rad-button flat bg-lightgrey circular flex " type="button">
                    <img class="invert" src="../Assets/svg/plus.svg" alt="Plus Sign" width="16px">
                    Create 
                </button>
                
                
            </div>
            <div class="library-content">
                <div class="playlistCreation"></div>
                <footer class="legal">
                <ul class=" legal-links nobullets flex transparent">
                    <li><a href="#">Legal</a></li>
                    <li><a href="#">Safety & Privacy Center</a></li>
                    <li><a href="#">Privacy Policy</a></li>
                    <li><a href="#">Cookie Settings</a></li>
                    <li><a href="#">About Ads</a></li>
                    <li><a href="#">Accessibility</a></li>
                </ul>
            </footer>
        </div>

            
        
        
        </section>
        <section class="right rounded bg-grey vflex">
            
            <h2 class="right-heading">Trending songs</h2>
            <div class="cardContainer">

                <div class="card">
                    <div class="cardImage">
                        <img class="coverImg" src="https://i.scdn.co/image/ab67616d00001e02cdce9a38222807fa703b4396" alt="">
                        <div class="playBtn">
                            <img src="../Assets/svg/play.svg" alt="" >
                        </div>
                    </div>
                    <div class="imageInfo">
                        <h3>Bairan</h3>
                        <p>Banjaare</p>
                    </div>
                </div>

                <div class="card">
                    <div class="cardImage">
                        <img class="coverImg" src="https://i.scdn.co/image/ab67616d00001e02cdce9a38222807fa703b4396" alt="">
                        <div class="playBtn">
                            <img src="../Assets/play.svg" alt="" >
                        </div>
                    </div>
                    <div class="imageInfo">
                        <h3>Bairan</h3>
                        <p>Banjaare</p>
                    </div>
                </div>

                <div class="card">
                    <div class="cardImage">
                        <img class="coverImg" src="https://i.scdn.co/image/ab67616d00001e02cdce9a38222807fa703b4396" alt="">
                        <div class="playBtn">
                            <img src="../Assets/play.svg" alt="" >
                        </div>
                    </div>
                    <div class="imageInfo">
                        <h3>Bairan</h3>
                        <p>Banjaare</p>
                    </div>
                </div>

                <div class="card">
                    <div class="cardImage">
                        <img class="coverImg" src="https://i.scdn.co/image/ab67616d00001e02cdce9a38222807fa703b4396" alt="">
                        <div class="playBtn">
                            <img src="../Assets/play.svg" alt="" >
                        </div>
                    </div>
                    <div class="imageInfo">
                        <h3>Bairan</h3>
                        <p>Banjaare</p>
                    </div>
                </div>

                 <div class="card">
                    <div class="cardImage">
                        <img class="coverImg" src="https://i.scdn.co/image/ab67616d00001e02cdce9a38222807fa703b4396" alt="">
                        <div class="playBtn">
                            <img src="../Assets/play.svg" alt="" >
                        </div>
                    </div>
                    <div class="imageInfo">
                        <h3>Bairan</h3>
                        <p>Banjaare</p>
                    </div>
                </div>
            </div>




            <div class="playBar flex circular ">

                <div class="songInfo"></div>

                <div class="song-buttons flex">
                    <img src="../Assets/svg/next.svg" alt="" class="prev flip invert">
                    <div class="playBar-playBtn circular">
                        <img src="../Assets/svg/play.svg" alt="">
                    </div>
                    <img src="../Assets/svg/next.svg" alt="" class="next invert">
                </div>

                <div class="songTime"></div>
            </div>

        </section>
    </main>
    
    
    <script src="./script.js"></script>
</body>
</html>
